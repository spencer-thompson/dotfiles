# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'
palette = "noctalia"

add_newline = false
# continuation_prompt = "[ÔûÄÔöé ](dimmed white)"
continuation_prompt = "[ÔêÖ ](dimmed white)"
# format = """[Ôöî ](green)$battery$shell$all\
# [Ôöö ](green)$jobs$directory$character"""
format = """\n [´æä](dimmed purple) $fill $cmd_duration$time $fill [´æä](dimmed purple) 
$jobs$directory$character"""

right_format = """$git_metrics$all"""

[fill]
symbol = 'ÔöÇ'
style = "black"

# [character]
# success_symbol = "[Ôöé](bold green)"
# # success_symbol = "[Ôòæ](bold green)"
# # success_symbol = "[¾░àé¾▒ï▒](bold green)"
# # error_symbol = "[¾░çØ](bold red)"
# error_symbol = "[Ôöè](bold red)"
# # error_symbol = "[Ôöï](bold red)"
# vimcmd_symbol = "[´ôâ](bold green)"
# # vimcmd_symbol = "[Ôö£](bold bright-green)"
# # vimcmd_symbol = "[¾░àü¾░çØ](bold green)"

[character]
# success_symbol = "[ÔØ»](green)"
success_symbol = "[|>](green)"
error_symbol = "[|>](bold red)"
vimcmd_symbol = "[<|](purple)"

# [package]
# disabled = true

# [git_branch] # default
# symbol = "¯éá "
# ´Éİ 

[git_commit]
tag_symbol = "´ÆÂ "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
# format = '$all_status$ahead_behind'
conflicted = '\[!=${count}\]'
stashed = '[\[*${count}\]](bold yellow)'
deleted = '\[¾░ğğ${count}\]'
renamed = '\[┬╗${count}\]'
modified = '\[+${count}\]'
staged = '[\[++${count}\]](bold yellow)'
untracked = '\[?${count}\]'
ahead = '\[¾░üö${count}\]'
behind = '\[¾░üı${count}\]'
up_to_date = '[\[Ô£ô\]](bold green)'

[git_metrics]
disabled = false

[directory]
home_symbol = "~"
read_only = " ¯éó"
truncation_length = 4
# truncation_symbol = "ÔÇóÔÇó/"
truncation_symbol = ".../"
format = '[$path]($style)[$read_only]($read_only_style) '
# format = '[\[¾░çØ¾▒ï▒](bold fg:green)[$path]($style)[$read_only]($read_only_style)[\]](bold fg:green)'

[directory.substitutions]
