[global]
line-length = 120
respect-gitignore = true
exclude = [
  ".git",
  ".github",
  "node_modules",
  "vendor",
  "dist",
  "build",
  "cache",
  "plugins/cache",
  "vendor_imports",
  ".rumdl_cache",
]

[MD003]
style = "atx"

[MD004]
style = "dash"

[MD007]
indent = 2

[MD013]
line-length = 120
code-blocks = false
tables = false
ignore-link-urls = true

[MD026]
punctuation = ".,;:!"

[MD029]
style = "one-or-ordered"

[MD033]
allowed-elements = ["br", "details", "summary"]

[MD046]
style = "fenced"

[MD048]
style = "backtick"

[MD049]
style = "asterisk"

[MD050]
style = "asterisk"
